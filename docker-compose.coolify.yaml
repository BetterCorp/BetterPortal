x-bp-common: &bp-common
  image: ${BSB_IMAGE:-code.bettercorp.dev/bettercorp/service-base:node-latest}
  restart: unless-stopped

x-bp-vault-env: &bp-vault-env
  BSB_WRITABLE_PATHS: /data
  BSB_PLUGIN_DIRS: /mnt/plugins
  BSB_PLUGIN_UPDATE: ${BSB_PLUGIN_UPDATE:-false}
  BSB_SHOW_PACKAGES: ${BSB_SHOW_PACKAGES:-false}
  BSB_CONFIG_PLUGIN: config-vault
  BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/config-vault"
  vaultUrl: ${BP_VAULT_URL:-https://vault.eu.core.betterportal.net}

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BP_POSTGRES_DB:-betterportal}
      POSTGRES_USER: ${BP_POSTGRES_USER:-betterportal}
      POSTGRES_PASSWORD: ${BP_POSTGRES_PASSWORD:?Set BP_POSTGRES_PASSWORD for BetterPortal Postgres}
    volumes:
      - bp-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  config-manager:
    <<: *bp-common
    environment:
      <<: *bp-vault-env
      BSB_PLUGINS: "@betterportal/config-manager@${BP_PACKAGE_VERSION:-latest},@bsb/observable-opentelemetry,@bsb/observable-axiom"
      apiKeyId: ${BP_CONFIG_MANAGER_VAULT_API_KEY_ID:?Set BP_CONFIG_MANAGER_VAULT_API_KEY_ID for the config-manager service}
      apiSecret: ${BP_CONFIG_MANAGER_VAULT_API_SECRET:?Set BP_CONFIG_MANAGER_VAULT_API_SECRET for the config-manager service}
    volumes:
      - bp-plugins:/mnt/plugins
      - bp-config-manager:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:80/.well-known/bp/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  bootstrap1:
    <<: *bp-common
    environment:
      <<: *bp-vault-env
      BSB_PLUGINS: "@betterportal/theme-bootstrap1@${BP_PACKAGE_VERSION:-latest},@bsb/observable-opentelemetry,@bsb/observable-axiom"
      apiKeyId: ${BP_BOOTSTRAP1_VAULT_API_KEY_ID:?Set BP_BOOTSTRAP1_VAULT_API_KEY_ID for the bootstrap1 service}
      apiSecret: ${BP_BOOTSTRAP1_VAULT_API_SECRET:?Set BP_BOOTSTRAP1_VAULT_API_SECRET for the bootstrap1 service}
    volumes:
      - bp-plugins:/mnt/plugins
      - bp-bootstrap1-data:/data
    depends_on:
      - config-manager
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:80/.well-known/bp/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  embedded:
    <<: *bp-common
    environment:
      <<: *bp-vault-env
      BSB_PLUGINS: "@betterportal/theme-embedded@${BP_PACKAGE_VERSION:-latest},@bsb/observable-opentelemetry,@bsb/observable-axiom"
      apiKeyId: ${BP_EMBEDDED_VAULT_API_KEY_ID:?Set BP_EMBEDDED_VAULT_API_KEY_ID for the embedded service}
      apiSecret: ${BP_EMBEDDED_VAULT_API_SECRET:?Set BP_EMBEDDED_VAULT_API_SECRET for the embedded service}
    volumes:
      - bp-plugins:/mnt/plugins
      - bp-embedded-data:/data
    depends_on:
      - config-manager

  auth-default:
    <<: *bp-common
    environment:
      <<: *bp-vault-env
      BSB_PLUGINS: "@betterportal/auth-default@${BP_PACKAGE_VERSION:-latest},@bsb/observable-opentelemetry,@bsb/observable-axiom"
      apiKeyId: ${BP_AUTH_DEFAULT_VAULT_API_KEY_ID:?Set BP_AUTH_DEFAULT_VAULT_API_KEY_ID for the auth-default service}
      apiSecret: ${BP_AUTH_DEFAULT_VAULT_API_SECRET:?Set BP_AUTH_DEFAULT_VAULT_API_SECRET for the auth-default service}
    volumes:
      - bp-plugins:/mnt/plugins
      - bp-auth-default-data:/data
    depends_on:
      - config-manager

  auth-authress-io:
    <<: *bp-common
    environment:
      <<: *bp-vault-env
      BSB_PLUGINS: "@betterportal/auth-authress-io@${BP_PACKAGE_VERSION:-latest},@bsb/observable-opentelemetry,@bsb/observable-axiom"
      apiKeyId: ${BP_AUTHRESS_VAULT_API_KEY_ID:?Set BP_AUTHRESS_VAULT_API_KEY_ID for the auth-authress-io service}
      apiSecret: ${BP_AUTHRESS_VAULT_API_SECRET:?Set BP_AUTHRESS_VAULT_API_SECRET for the auth-authress-io service}
    volumes:
      - bp-plugins:/mnt/plugins
      - bp-authress-data:/data
    depends_on:
      - config-manager

  hello-view:
    <<: *bp-common
    environment:
      <<: *bp-vault-env
      BSB_PLUGINS: "@betterportal/hello-view@${BP_PACKAGE_VERSION:-latest},@bsb/observable-opentelemetry,@bsb/observable-axiom"
      apiKeyId: ${BP_HELLO_VIEW_VAULT_API_KEY_ID:?Set BP_HELLO_VIEW_VAULT_API_KEY_ID for the hello-view service}
      apiSecret: ${BP_HELLO_VIEW_VAULT_API_SECRET:?Set BP_HELLO_VIEW_VAULT_API_SECRET for the hello-view service}
    volumes:
      - bp-plugins:/mnt/plugins
      - bp-hello-view-data:/data
    depends_on:
      - config-manager

volumes:
  bp-postgres:
  bp-plugins:
  bp-config-manager:
  bp-bootstrap1-data:
  bp-embedded-data:
  bp-auth-default-data:
  bp-authress-data:
  bp-hello-view-data:
