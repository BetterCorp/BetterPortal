x-bp-build: &bp-build
  context: .
  dockerfile: Dockerfile.coolify
  args:
    BSB_IMAGE: ${BSB_IMAGE:-betterweb/service-base:node}

x-bp-common: &bp-common
  image: betterportal:${BP_IMAGE_TAG:-coolify}
  build: *bp-build
  restart: unless-stopped

services:
  config-manager:
    <<: *bp-common
    working_dir: /data
    environment:
      BSB_CONFIG_PLUGIN: config-env
      BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/base"
      BSB_PLUGIN_DIRS: /bp/plugins
      APP_DIR: /bp
      BSB_CONFIG_JSON: ${BP_CONFIG_MANAGER_BSB_CONFIG_JSON:?Set BP_CONFIG_MANAGER_BSB_CONFIG_JSON for the config-manager service}
    volumes:
      - bp-config-manager:/data
    ports:
      - "${BP_CONFIG_MANAGER_PORT:-3300}:${BP_CONFIG_MANAGER_PORT:-3300}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${BP_CONFIG_MANAGER_PORT:-3300}/.well-known/bp/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  bootstrap1:
    <<: *bp-common
    working_dir: /bp
    environment:
      BSB_CONFIG_PLUGIN: config-env
      BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/base"
      BSB_PLUGIN_DIRS: /bp/plugins
      BSB_CONFIG_JSON: ${BP_BOOTSTRAP1_BSB_CONFIG_JSON:?Set BP_BOOTSTRAP1_BSB_CONFIG_JSON for the bootstrap1 service}
    volumes:
      - bp-bootstrap1-state:/bp/.bp-bootstrap
      - bp-bootstrap1-sync:/bp/.bp-sync-cache
    ports:
      - "${BP_BOOTSTRAP1_PORT:-3100}:${BP_BOOTSTRAP1_PORT:-3100}"
    depends_on:
      - config-manager
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${BP_BOOTSTRAP1_PORT:-3100}/.well-known/bp/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  embedded:
    <<: *bp-common
    working_dir: /bp
    environment:
      BSB_CONFIG_PLUGIN: config-env
      BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/base"
      BSB_PLUGIN_DIRS: /bp/plugins
      BSB_CONFIG_JSON: ${BP_EMBEDDED_BSB_CONFIG_JSON:?Set BP_EMBEDDED_BSB_CONFIG_JSON for the embedded service}
    volumes:
      - bp-embedded-state:/bp/.bp-bootstrap
      - bp-embedded-sync:/bp/.bp-sync-cache
    ports:
      - "${BP_EMBEDDED_PORT:-3110}:${BP_EMBEDDED_PORT:-3110}"
    depends_on:
      - config-manager

  auth-default:
    <<: *bp-common
    working_dir: /bp
    environment:
      BSB_CONFIG_PLUGIN: config-env
      BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/base"
      BSB_PLUGIN_DIRS: /bp/plugins
      BSB_CONFIG_JSON: ${BP_AUTH_DEFAULT_BSB_CONFIG_JSON:?Set BP_AUTH_DEFAULT_BSB_CONFIG_JSON for the auth-default service}
    volumes:
      - bp-auth-default-data:/data
    ports:
      - "${BP_AUTH_DEFAULT_PORT:-3210}:${BP_AUTH_DEFAULT_PORT:-3210}"
    depends_on:
      - config-manager

  auth-authress-io:
    <<: *bp-common
    working_dir: /bp
    environment:
      BSB_CONFIG_PLUGIN: config-env
      BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/base"
      BSB_PLUGIN_DIRS: /bp/plugins
      BSB_CONFIG_JSON: ${BP_AUTHRESS_BSB_CONFIG_JSON:?Set BP_AUTHRESS_BSB_CONFIG_JSON for the auth-authress-io service}
    volumes:
      - bp-authress-data:/data
    ports:
      - "${BP_AUTHRESS_PORT:-3212}:${BP_AUTHRESS_PORT:-3212}"
    depends_on:
      - config-manager

  docs-site:
    <<: *bp-common
    working_dir: /bp
    environment:
      BSB_CONFIG_PLUGIN: config-env
      BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/base"
      BSB_PLUGIN_DIRS: /bp/plugins
      BSB_CONFIG_JSON: ${BP_DOCS_BSB_CONFIG_JSON:?Set BP_DOCS_BSB_CONFIG_JSON for the docs-site service}
    volumes:
      - bp-docs-data:/data
    ports:
      - "${BP_DOCS_PORT:-3400}:${BP_DOCS_PORT:-3400}"
    depends_on:
      - config-manager

  hello-view:
    <<: *bp-common
    working_dir: /bp
    environment:
      BSB_CONFIG_PLUGIN: config-env
      BSB_CONFIG_PLUGIN_PACKAGE: "@bsb/base"
      BSB_PLUGIN_DIRS: /bp/plugins
      BSB_CONFIG_JSON: ${BP_HELLO_BSB_CONFIG_JSON:?Set BP_HELLO_BSB_CONFIG_JSON for the hello-view service}
    volumes:
      - bp-hello-data:/data
    ports:
      - "${BP_HELLO_PORT:-3205}:${BP_HELLO_PORT:-3205}"
    depends_on:
      - config-manager

volumes:
  bp-config-manager:
  bp-bootstrap1-state:
  bp-bootstrap1-sync:
  bp-embedded-state:
  bp-embedded-sync:
  bp-auth-default-data:
  bp-authress-data:
  bp-docs-data:
  bp-hello-data:
