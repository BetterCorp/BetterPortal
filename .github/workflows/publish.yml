name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  build-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@betterportal'

      - name: Install
        run: npm ci --workspaces --include-workspace-root

      - name: Version workspace from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node scripts/release/set-workspace-version.mjs "$TAG"

      - name: Build core packages
        run: |
          npm run build -w @betterportal/framework
          npm run build -w @betterportal/plugin-bsb

  build-plugins:
    runs-on: ubuntu-latest
    needs: build-core
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - services/nodejs/auth-default
          - services/nodejs/auth-authress-io
          - themes/nodejs/bootstrap1
          - themes/nodejs/embedded
          - services/nodejs/admin/config-manager
          - services/nodejs/docs-site
          - services/nodejs/examples/hello-view
          - automations/n8n
          - automations/node-red
          - automations/zapier
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@betterportal'

      - name: Install
        run: npm ci --workspaces --include-workspace-root

      - name: Version workspace from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node scripts/release/set-workspace-version.mjs "$TAG"

      - name: Build local core dependencies
        run: |
          npm run build -w @betterportal/framework
          npm run build -w @betterportal/plugin-bsb

      - name: Build package
        run: npm run build -w "${{ matrix.workspace }}" --if-present

  publish-core:
    runs-on: ubuntu-latest
    needs: build-plugins
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@betterportal'

      - name: Install
        run: npm ci --workspaces --include-workspace-root

      - name: Version workspace from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node scripts/release/set-workspace-version.mjs "$TAG"

      - name: Build core packages
        run: |
          npm run build -w @betterportal/framework
          npm run build -w @betterportal/plugin-bsb

      - name: Publish core packages
        run: |
          npm publish -w @betterportal/framework --access public
          npm publish -w @betterportal/plugin-bsb --access public

  publish-plugin-packages:
    runs-on: ubuntu-latest
    needs: publish-core
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - services/nodejs/auth-default
          - services/nodejs/auth-authress-io
          - themes/nodejs/bootstrap1
          - themes/nodejs/embedded
          - services/nodejs/admin/config-manager
          - services/nodejs/docs-site
          - services/nodejs/examples/hello-view
          - automations/n8n
          - automations/node-red
          - automations/zapier
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@betterportal'

      - name: Install
        run: npm ci --workspaces --include-workspace-root

      - name: Version workspace from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node scripts/release/set-workspace-version.mjs "$TAG"

      - name: Build local core dependencies
        run: |
          npm run build -w @betterportal/framework
          npm run build -w @betterportal/plugin-bsb

      - name: Build package
        run: npm run build -w "${{ matrix.workspace }}" --if-present

      - name: Publish package
        run: npm publish -w "${{ matrix.workspace }}" --access public

  publish-bsb-schemas:
    runs-on: ubuntu-latest
    needs: publish-plugin-packages
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - services/nodejs/auth-default
          - services/nodejs/auth-authress-io
          - themes/nodejs/bootstrap1
          - themes/nodejs/embedded
          - services/nodejs/admin/config-manager
          - services/nodejs/docs-site
          - services/nodejs/examples/hello-view
          - automations/n8n
          - automations/node-red
          - automations/zapier
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@betterportal'

      - name: Install
        run: npm ci --workspaces --include-workspace-root

      - name: Version workspace from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node scripts/release/set-workspace-version.mjs "$TAG"

      - name: Build local core dependencies
        run: |
          npm run build -w @betterportal/framework
          npm run build -w @betterportal/plugin-bsb

      - name: Build package
        run: npm run build -w "${{ matrix.workspace }}" --if-present

      - name: Publish BSB registry schema
        env:
          BSB_REGISTRY_TOKEN: ${{ secrets.BSB_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          ws="${{ matrix.workspace }}"
          if [ ! -f "$ws/bsb-plugin.json" ]; then
            echo "No bsb-plugin.json in $ws; skipping BSB registry publish"
            exit 0
          fi
          if [ -z "${BSB_REGISTRY_TOKEN:-}" ]; then
            echo "::error::BSB_REGISTRY_TOKEN secret is required to publish BetterPortal plugin schemas"
            exit 1
          fi
          for attempt in 1 2 3; do
            if (cd "$ws" && npm run publish:client); then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              break
            fi
            sleep $((attempt * 10))
          done
          exit 1
