name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@betterportal'

      - name: Install
        run: npm ci --workspaces --include-workspace-root

      - name: Build all workspaces
        run: npm run -ws build --if-present

      - name: Test all workspaces
        run: npm test

      - name: Tag version sanity check
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for ws in $(node -p "JSON.stringify(require('./package.json').workspaces || [])" | jq -r '.[]'); do
            PKG_VERSION=$(node -p "require('./$ws/package.json').version")
            PKG_NAME=$(node -p "require('./$ws/package.json').name")
            if [ "$PKG_VERSION" != "$TAG" ]; then
              echo "::error::$PKG_NAME version $PKG_VERSION does not match tag $TAG"
              exit 1
            fi
          done

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        run: npm publish --workspaces --access public --dry-run

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry-run == false)
        run: npm publish --workspaces --access public
