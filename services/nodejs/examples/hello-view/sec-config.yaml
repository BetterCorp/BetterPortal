default:
  observable:
    observable-default:
      plugin: observable-default
      enabled: true
      config: {}
  events:
    events-default:
      plugin: events-default
      enabled: true
  services:
    service-betterportal-hello-view:
      plugin: service-betterportal-hello-view
      enabled: true
      config:
        host: 0.0.0.0
        port: 3205
        betterportal:
          # No bpConfigPath — BP services receive their config from the CP via
          # sync push, cached locally at .bp-sync-cache/scoped.json. With no
          # serviceApiKey/controlPlaneUrl either, the service boots in setup
          # mode: install it from the CM admin UI (services registry → install)
          # and the redeemed apiKey persists to .bp-bootstrap/state.enc.
