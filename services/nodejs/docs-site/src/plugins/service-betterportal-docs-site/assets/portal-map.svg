    <rect x="706" y="280" width="144" height="12" rx="6" fill="#cbd5e1"/>
    <text x="784" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">bp-config</text>
  </g>
